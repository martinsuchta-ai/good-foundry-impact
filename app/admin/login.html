<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin sign in — Impacts Foundry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-shell">
    <form class="auth-card" id="login-form" autocomplete="on">
        <div class="auth-eyebrow">Impacts Foundry</div>
        <h1 class="auth-title">Admin sign in</h1>
        <p class="auth-sub">Sign in to manage consumers, placements, and impact projects.</p>

        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="username">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">Sign in</button>

        <div class="msg msg-error" id="msg" style="display:none"></div>
    </form>
</div>

<script>
(function () {
    var form = document.getElementById('login-form');
    var msg  = document.getElementById('msg');
    var btn  = document.getElementById('submit-btn');

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        msg.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        var email    = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        fetch('../../api/admin/auth.php?action=login', {
            method:      'POST',
            credentials: 'include',
            headers:     { 'Content-Type': 'application/json' },
            body:        JSON.stringify({ email: email, password: password })
        })
            .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
            .then(function (res) {
                if (res.ok && res.body && res.body.ok) {
                    window.location.replace('index.html');
                    return;
                }
                msg.textContent = (res.body && res.body.error) || 'Sign in failed';
                msg.style.display = '';
                btn.disabled = false;
                btn.textContent = 'Sign in';
            })
            .catch(function () {
                msg.textContent = 'Network error — try again.';
                msg.style.display = '';
                btn.disabled = false;
                btn.textContent = 'Sign in';
            });
    });

    /* If we already have a session, jump straight to dashboard. */
    fetch('../../api/admin/auth.php?action=me', { credentials: 'include', cache: 'no-store' })
        .then(function (r) { if (r.ok) window.location.replace('index.html'); })
        .catch(function () { /* show form */ });
})();
</script>

</body>
</html>
