<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impacts Foundry</title>
    <meta name="description" content="Time-boxed Impact Projects — sponsors create them, supporters commit Effort, Energy, or Money. It's not about the money, honey, it's about making an impact.">
    <style>
        :root {
            --bg-deep:    #14202e;
            --green:      #2e7d52;
            --green-soft: rgba(46,125,82,.18);
            --text-light: #f4f7fb;
            --text-soft:  rgba(244,247,251,.66);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-deep);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
            line-height: 1.55;
        }
        .wrap {
            max-width: 560px;
            text-align: center;
        }
        .eyebrow {
            font-size: 11px;
            font-weight: 800;
            color: var(--green);
            letter-spacing: .16em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        h1 {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -.02em;
            margin: 0 0 14px;
        }
        h1 em {
            font-style: italic;
            color: var(--green);
            font-weight: 700;
        }
        p {
            margin: 0 0 22px;
            color: var(--text-soft);
            font-size: 15px;
        }
        .tagline {
            display: inline-block;
            padding: 8px 16px;
            background: var(--green-soft);
            border: 1px solid rgba(46,125,82,.35);
            color: #b3e6c8;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .02em;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="eyebrow">Coming soon</div>
    <h1>Go Make <em>Impact</em>.</h1>
    <p>Time-boxed impact projects — sponsors define a mission with a definite end, supporters commit Effort, Energy, or Money. WBM is consumer #1.</p>
    <div class="tagline">It's not about the money, honey — it's about making an impact.</div>
</div>
</body>
</html>
